<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>406实训室 - 作品导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: #0f172a;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.16), transparent 24%),
                linear-gradient(180deg, #eef4ff 0%, #f8fafc 46%, #eef2ff 100%);
        }

        .page-shell {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding: 48px 0 60px;
        }

        .hero {
            padding: 34px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(37, 99, 235, 0.9));
            color: #ffffff;
            box-shadow: 0 22px 50px rgba(15, 23, 42, 0.18);
        }

        .hero-tag {
            display: inline-flex;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-size: 0.88rem;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .hero h1 {
            margin-top: 1rem;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            max-width: 760px;
            margin-top: 1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.82);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0.85rem 1.25rem;
            border-radius: 999px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .btn-primary {
            color: #ffffff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.24);
        }

        .btn-secondary {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.4rem;
            margin-top: 28px;
        }

        .card {
            padding: 24px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(14px);
        }

        .card-tag {
            display: inline-flex;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            color: #ffffff;
        }

        .tag-ue { background: linear-gradient(135deg, #06b6d4, #2563eb); }
        .tag-ai { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .tag-research { background: linear-gradient(135deg, #8b5cf6, #6366f1); }

        .card h2 {
            margin-top: 1rem;
            font-size: 1.5rem;
        }

        .card p {
            margin-top: 0.85rem;
            color: #475569;
            line-height: 1.75;
        }

        .card .btn {
            margin-top: 1.2rem;
            color: #2563eb;
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.16);
        }

        @media (max-width: 768px) {
            .page-shell {
                width: min(100% - 24px, 1180px);
                padding-top: 24px;
            }

            .hero,
            .card {
                padding: 22px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <section class="hero">
            <span class="hero-tag">WORKS NAVIGATION</span>
            <h1>作品导航</h1>
            <p>作品展示已拆分为三个独立页面。你可以按技术方向进入对应的“更多作品”页面，查看该方向的完整项目内容。</p>
            <div class="actions">
                <a class="btn btn-primary" href="index.html">返回首页</a>
                <a class="btn btn-secondary" href="works-ue.html">UE互动开发</a>
                <a class="btn btn-secondary" href="works-ai.html">AI影视创作</a>
                <a class="btn btn-secondary" href="works-research.html">人工智能研究</a>
            </div>
        </section>

        <section class="grid">
            <article class="card">
                <span class="card-tag tag-ue">技术方向 01</span>
                <h2>UE互动开发</h2>
                <p>查看数字孪生、VR交互、三维导览与虚拟仿真等 UE 项目作品。</p>
                <a class="btn" href="works-ue.html">进入该方向</a>
            </article>
            <article class="card">
                <span class="card-tag tag-ai">技术方向 02</span>
                <h2>AI影视创作</h2>
                <p>查看 AI 短片、生成式短剧、宣传片与分镜可视化等影视创作作品。</p>
                <a class="btn" href="works-ai.html">进入该方向</a>
            </article>
            <article class="card">
                <span class="card-tag tag-research">技术方向 03</span>
                <h2>人工智能研究</h2>
                <p>查看竞赛项目、校园落地应用、论文复现和数据建模分析等研究成果。</p>
                <a class="btn" href="works-research.html">进入该方向</a>
            </article>
        </section>
    </main>
</body>
</html>
