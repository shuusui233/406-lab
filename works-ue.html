<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>406实训室 - UE互动开发作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: #0f172a;
            background:
                radial-gradient(circle at top left, rgba(6, 182, 212, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.16), transparent 24%),
                linear-gradient(180deg, #eef8ff 0%, #f8fafc 46%, #eef2ff 100%);
        }

        .page-shell {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        .page-header {
            position: sticky;
            top: 16px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 16px 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        .brand-block h1 {
            font-size: 1.55rem;
            margin-bottom: 0.35rem;
        }

        .brand-block p {
            color: #475569;
            font-size: 0.96rem;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0.8rem 1.25rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            color: #ffffff;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.22);
        }

        .btn-secondary {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.18);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .works-section {
            margin-top: 12px;
            padding: 28px 28px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
        }

        .section-label {
            display: inline-flex;
            padding: 0.32rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
        }

        .works-section h2 {
            margin-top: 0.95rem;
            font-size: 1.9rem;
            color: #ffffff;
        }

        .section-desc {
            margin-top: 0.8rem;
            max-width: 760px;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.8;
        }

        .preview-section {
            margin-top: 1.8rem;
        }

        .preview-header {
            margin-bottom: 1.2rem;
        }

        .preview-header h3 {
            font-size: 1.08rem;
            color: #ffffff;
        }

        .preview-header p {
            margin-top: 0.45rem;
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.94rem;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1.2rem;
        }

        .preview-card {
            text-align: center;
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            border-radius: 16px;
            background: rgba(148, 163, 184, 0.18);
            border: 1px dashed rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.76);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .preview-card h4 {
            margin-top: 0.85rem;
            font-size: 1rem;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .page-shell {
                width: min(100% - 24px, 1180px);
                padding-top: 16px;
            }

            .page-header {
                position: static;
                padding: 16px;
            }

            .works-section {
                padding: 22px 18px;
            }

            .header-actions {
                justify-content: flex-start;
            }

            .preview-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="page-header">
            <div class="brand-block">
                <h1>406实训室</h1>
                <p>UE互动开发作品页</p>
            </div>
            <div class="header-actions">
                <a class="btn btn-primary" href="index.html?section=ue-section">返回首页</a>
            </div>
        </header>

        <section class="works-section">
            <span class="section-label">技术方向 01</span>
            <h2>UE互动开发</h2>
            <p class="section-desc">仅保留作品预览内容，后续可直接替换为真实封面或演示图。</p>
            <div class="preview-section">
                <div class="preview-header">
                    <h3>作品预览</h3>
                    <p>素材整理中，内容即将上线。</p>
                </div>
                <div class="preview-grid">
                    <article class="preview-card">
                        <div class="preview-placeholder">即将上线</div>
                        <h4>数字孪生</h4>
                    </article>
                    <article class="preview-card">
                        <div class="preview-placeholder">即将上线</div>
                        <h4>VR互动</h4>
                    </article>
                    <article class="preview-card">
                        <div class="preview-placeholder">即将上线</div>
                        <h4>虚拟仿真</h4>
                    </article>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
